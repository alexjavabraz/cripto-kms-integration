spring:
  application:
    name: kms-integration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        # Uses IAM role automatically on ECS/EC2 — no keys needed in env
      sqs:
        endpoint: ${AWS_SQS_ENDPOINT:}
      sns:
        endpoint: ${AWS_SNS_ENDPOINT:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SPRING_PROFILES_ACTIVE:default}
  traces-sample-rate: 0.1

kms:
  region: ${AWS_REGION:us-east-1}
  key-id: ${KMS_KEY_ID}
  wallet-address: ${KMS_WALLET_ADDRESS:}

  dlt:
    rpc-endpoint: ${DLT_RPC_ENDPOINT}
    chain-id: ${DLT_CHAIN_ID:1337}
    explorer-url: ${DLT_EXPLORER_URL:}
    gas-limit: ${DLT_GAS_LIMIT:10000000}
    max-fee-per-gas: ${DLT_MAX_FEE_PER_GAS:0}
    max-priority-fee-per-gas: ${DLT_MAX_PRIORITY_FEE_PER_GAS:0}
    gas-fund-amount-eth: ${DLT_GAS_FUND_AMOUNT_ETH:0.001}

  # SNS FIFO topic — kms-integration publishes responses here
  sns:
    topic-arn: ${SNS_TOPIC_ARN}

  # SQS FIFO queue — kms-integration reads requests from here (subscribed to client SNS)
  sqs:
    queue-name: ${SQS_QUEUE_NAME:atoken-integracao-kms-sqs-dev.fifo}
