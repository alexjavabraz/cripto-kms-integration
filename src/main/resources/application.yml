spring:
  application:
    name: kms-integration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # AWS Secrets Manager — loads DB credentials when running in AWS
  # Secret must be a flat JSON: {"DB_HOST":"...","DB_USERNAME":"...","DB_PASSWORD":"...","DB_LIQUIBASE_PASSWORD":"..."}
  config:
    import: "optional:aws-secretsmanager:/kms-integration/rds-credentials"

  datasource:
    url: jdbc:postgresql://${DB_HOST:192.168.15.5}:${DB_PORT:5432}/${DB_NAME:kms_db}
    username: ${DB_USERNAME:kms_app}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    user: ${DB_LIQUIBASE_USER:dpl_devops_liquibase}
    password: ${DB_LIQUIBASE_PASSWORD:}
    enabled: true

  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      sqs:
        endpoint: ${AWS_SQS_ENDPOINT:}
      sns:
        endpoint: ${AWS_SNS_ENDPOINT:}
      secretsmanager:
        endpoint: ${AWS_SECRETSMANAGER_ENDPOINT:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

kms:
  region: ${AWS_REGION:us-east-1}
  key-id: ${KMS_KEY_ID:}
  wallet-address: ${KMS_WALLET_ADDRESS:}

  dlt:
    rpc-endpoint: ${DLT_RPC_ENDPOINT}
    chain-id: ${DLT_CHAIN_ID:1337}
    explorer-url: ${DLT_EXPLORER_URL:}
    gas-limit: ${DLT_GAS_LIMIT:10000000}
    max-fee-per-gas: ${DLT_MAX_FEE_PER_GAS:0}
    max-priority-fee-per-gas: ${DLT_MAX_PRIORITY_FEE_PER_GAS:0}
    gas-fund-amount-eth: ${DLT_GAS_FUND_AMOUNT_ETH:0.001}

  # SNS FIFO topic — kms-integration publishes responses here
  sns:
    topic-arn: ${SNS_TOPIC_ARN}

  # SQS FIFO queue — kms-integration reads requests from here (subscribed to client SNS)
  sqs:
    queue-name: ${SQS_QUEUE_NAME:atoken-integracao-kms-sqs-dev.fifo}
